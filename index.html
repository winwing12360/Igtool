<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>仙貝 IG 發送工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #2D6A4F; --green-light: #40916C; --green-pale: #D8F3DC;
    --green-mid: #B7E4C7; --gold: #C9A84C; --bg: #F7F9F7;
    --card: #FFFFFF; --text: #1B2D22; --muted: #6B8F71;
    --border: #E0EBE2; --done: #27AE60;
  }
  body { background: var(--bg); font-family: -apple-system, 'Helvetica Neue', sans-serif; color: var(--text); min-height: 100vh; }
  header { background: var(--green); padding: 18px 20px 14px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; }
  header h1 { color: white; font-size: 17px; font-weight: 700; }
  .badge { background: var(--gold); color: white; font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; display: none; }
  .badge.visible { display: block; }
  .progress-bar { height: 3px; background: var(--green-pale); display: none; }
  .progress-bar.visible { display: block; }
  .progress-fill { height: 100%; background: var(--gold); transition: width 0.3s ease; }
  .step { padding: 24px 16px; }
  .step-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .step h2 { font-size: 22px; font-weight: 700; color: var(--green); margin-bottom: 8px; }
  .step p { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }
  .upload-zone { border: 2.5px dashed var(--green-mid); border-radius: 16px; background: white; padding: 40px 20px; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; position: relative; }
  .upload-zone:hover { border-color: var(--green); background: var(--green-pale); }
  .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon { font-size: 48px; margin-bottom: 12px; }
  .upload-zone h3 { font-size: 17px; font-weight: 700; color: var(--green); margin-bottom: 6px; }
  .upload-zone p { font-size: 13px; color: var(--muted); margin: 0; }
  .hint-box { margin-top: 16px; background: var(--green-pale); border-left: 3px solid var(--green); border-radius: 8px; padding: 12px 14px; font-size: 13px; color: var(--green); line-height: 1.7; }
  .error-msg { background: #FDECEA; border: 1px solid #E74C3C; border-radius: 8px; color: #C0392B; font-size: 13px; padding: 10px 14px; margin-top: 12px; display: none; }
  .error-msg.visible { display: block; }
  .loading { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 15px; display: none; }
  .loading.visible { display: block; }
  #list-view { display: none; }
  .list-header { padding: 16px 16px 8px; display: flex; align-items: center; justify-content: space-between; }
  .list-header h2 { font-size: 18px; font-weight: 700; color: var(--green); }
  .list-header .count { font-size: 13px; color: var(--muted); }
  .filter-bar { padding: 0 16px 10px; display: flex; gap: 8px; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: white; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .filter-btn.active { background: var(--green); border-color: var(--green); color: white; }
  .cards { padding: 0 16px 100px; display: flex; flex-direction: column; gap: 10px; }
  .card { background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px; }
  .card.done { opacity: 0.5; border-color: var(--green-mid); background: var(--green-pale); }
  .card.hidden { display: none; }
  .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .card-num { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.06em; }
  .card-status { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
  .card-status.pending { background: var(--green-pale); color: var(--green); }
  .card-status.sent { background: #EAFAF1; color: var(--done); }
  .card-username { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
  .card-actions { display: flex; flex-direction: column; gap: 8px; }
  .btn-ig { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: white; border: none; border-radius: 10px; padding: 13px 8px; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; -webkit-tap-highlight-color: transparent; }
  .btn-msg { background: var(--gold); color: white; border: none; border-radius: 10px; padding: 13px 8px; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; transition: background 0.15s; }
  .btn-msg.copied { background: var(--done); }
  .btn-done { background: transparent; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .card.done .btn-done { border-color: var(--done); color: var(--done); }
  .all-done-banner { background: var(--green); color: white; text-align: center; padding: 16px; font-weight: 700; font-size: 16px; display: none; margin: 0 16px 10px; border-radius: 12px; }
  .all-done-banner.visible { display: block; }
  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid var(--border); padding: 12px 16px; }
  .btn-reset { display: block; width: 100%; background: transparent; border: 1.5px solid var(--border); border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 600; color: var(--muted); cursor: pointer; -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>

<header>
  <h1>🍘 仙貝 IG 發送工具</h1>
  <div class="badge" id="badge">0 / 0</div>
</header>
<div class="progress-bar" id="progressBar">
  <div class="progress-fill" id="progressFill" style="width:0%"></div>
</div>

<div id="input-view" class="step">
  <div class="step-label">第一步</div>
  <h2>上傳 iOPENMALL 匯出檔</h2>
  <p>從後台匯出「商品標題及描述」的 XLSX，直接上傳，系統自動找出消費者帳號並組好訊息。</p>
  <div class="upload-zone">
    <input type="file" accept=".xlsx,.xls" onchange="handleFile(this.files[0])" id="fileInput">
    <div class="upload-icon">📂</div>
    <h3>點此上傳 XLSX 檔案</h3>
    <p>product_batch_update_basic_43_xxxx.xlsx</p>
  </div>
  <div class="hint-box">
    <strong>自動篩選條件：</strong>商品原始貨號含「LIVE」的消費者商品<br>
    → 商品名稱 = IG 帳號　→　自動組成 iOPENMALL 連結
  </div>
  <div class="error-msg" id="errMsg"></div>
  <div class="loading" id="loading">⏳ 讀取中，請稍候…</div>
</div>

<div id="list-view">
  <div class="all-done-banner" id="allDoneBanner">🎉 全部發送完成！</div>
  <div class="list-header">
    <h2>發送清單</h2>
    <div class="count" id="countLabel"></div>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
    <button class="filter-btn" onclick="setFilter('pending',this)">未發送</button>
    <button class="filter-btn" onclick="setFilter('done',this)">已完成</button>
  </div>
  <div class="cards" id="cards"></div>
  <div class="bottom-bar">
    <button class="btn-reset" onclick="resetAll()">← 重新上傳新檔案</button>
  </div>
</div>

<script>
const STORE_ID = '000043';
const MSG_TEMPLATE = `您好～～這邊是iopenmall賣場已建立完畢

{LINK}

非常感謝妳的喜歡～～
下單前記得下滑領平台券做使用喔❤️
與賣貨便會員相同，無需重新註冊

🛒商品皆為預購
「結單日」起算14-21天工作日
（如遇廠商再製、缺貨會公告延長時間）
ig精選公告/貨況隨時更新

消費有達平台門檻的話
已經幫忙拆分金額囉
🛒範例：
訂單金額2000拆為金額$1000/$1000
如若有平台多張折價券可分開下單加速收貨
可以分為「兩筆」下單

如若無折價券
只需將兩個金額一起加入購物車結帳即可
⚠️務必都下單完畢

以下資訊務必詳閱
🖊️享直播優惠價或者平台折價券之訂單
如若後續發生商品缺貨或斷貨，一律退折扣碼使用
（商品是優惠價的話也是優惠價金額做折扣碼）
‼️如若缺貨需要退款請勿使用任何折價券以利作業

⚠️退款折扣碼與平台折價券僅能擇一使用
退款折扣碼不再提供扣抵商品金額之服務
請自行至IOPEN平台新增折價券碼即可使用
折扣碼使用期限為6個月

⚠️「收貨日」起算三天內有任何問題請提出，超過時間恕無法受理`;

let items = [], currentFilter = 'all';

function buildLink(prodNo, username) {
  return `https://mall.iopenmall.tw/${STORE_ID}/index.php?action=product_detail&prod_no=${prodNo}&utm_source=iOPEN%20Mall&utm_medium=%E5%95%86%E5%93%81&utm_campaign=${encodeURIComponent(username)}`;
}

function handleFile(file) {
  if (!file) return;
  document.getElementById('errMsg').classList.remove('visible');
  document.getElementById('loading').classList.add('visible');
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      let headerRow = -1;
      for (let i = 0; i < Math.min(5, rows.length); i++) {
        if (rows[i].join('').includes('商品貨號') || rows[i].join('').includes('商品名稱')) { headerRow = i; break; }
      }
      let colProdNo = 0, colOrigNo = 1, colName = 2;
      if (headerRow >= 0) {
        rows[headerRow].forEach((h, i) => {
          const s = String(h);
          if (s.includes('商品貨號') && !s.includes('原始')) colProdNo = i;
          if (s.includes('商品原始貨號')) colOrigNo = i;
          if (s.includes('商品名稱')) colName = i;
        });
      }
      const parsed = [];
      rows.slice(headerRow + 2).forEach(row => {
        const prodNo = String(row[colProdNo] || '').trim();
        const origNo = String(row[colOrigNo] || '').trim().toUpperCase();
        const name = String(row[colName] || '').trim();
        if (!prodNo.startsWith('P') || !name || !origNo.includes('LIVE')) return;
        parsed.push({ username: name, link: buildLink(prodNo, name), done: false });
      });
      document.getElementById('loading').classList.remove('visible');
      if (parsed.length === 0) {
        const err = document.getElementById('errMsg');
        err.textContent = '❌ 找不到原始貨號含「LIVE」的消費者商品。';
        err.classList.add('visible');
        return;
      }
      items = parsed;
      renderList();
      document.getElementById('input-view').style.display = 'none';
      document.getElementById('list-view').style.display = 'block';
      document.getElementById('badge').classList.add('visible');
      document.getElementById('progressBar').classList.add('visible');
      updateProgress();
    } catch(err) {
      document.getElementById('loading').classList.remove('visible');
      const e2 = document.getElementById('errMsg');
      e2.textContent = '❌ 讀取失敗：' + err.message;
      e2.classList.add('visible');
    }
  };
  reader.readAsArrayBuffer(file);
}

function renderList() {
  const container = document.getElementById('cards');
  container.innerHTML = '';
  items.forEach((item, i) => {
    const igUser = item.username.replace(/^@/, '');
    const card = document.createElement('div');
    card.className = `card ${item.done ? 'done' : ''}`;
    card.id = `card-${i}`;
    if (currentFilter === 'pending' && item.done) card.classList.add('hidden');
    if (currentFilter === 'done' && !item.done) card.classList.add('hidden');
    card.innerHTML = `
      <div class="card-top">
        <div class="card-num"># ${i + 1}</div>
        <div class="card-status ${item.done ? 'sent' : 'pending'}">${item.done ? '✓ 已發送' : '待發送'}</div>
      </div>
      <div class="card-username">@${item.username}</div>
      <div class="card-actions">
        <button class="btn-ig" onclick="openIG('${igUser}')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="white"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
          開啟 IG 對話
        </button>
        <button class="btn-msg" id="msg-${i}" onclick="copyMsg(${i})">💬 複製完整訊息（含連結）</button>
        <button class="btn-done" id="done-${i}" onclick="toggleDone(${i})">${item.done ? '✓ 取消完成' : '標記為已發送'}</button>
      </div>`;
    container.appendChild(card);
  });
  updateProgress();
}

function openIG(username) { window.open(`https://www.instagram.com/${username}/`, '_blank'); }

function copyMsg(i) {
  const msg = MSG_TEMPLATE.replace('{LINK}', items[i].link);
  const btn = document.getElementById('msg-' + i);
  const succeed = () => {
    btn.classList.add('copied');
    btn.textContent = '✅ 已複製！去 IG 貼上發送';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '💬 複製完整訊息（含連結）'; }, 3000);
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(msg).then(succeed).catch(() => fallback(msg, succeed));
  } else { fallback(msg, succeed); }
}

function fallback(text, cb) {
  const el = document.createElement('textarea');
  el.value = text; el.style.cssText = 'position:fixed;opacity:0';
  document.body.appendChild(el); el.select(); document.execCommand('copy');
  document.body.removeChild(el); cb();
}

function toggleDone(i) { items[i].done = !items[i].done; renderList(); applyFilter(currentFilter); checkAllDone(); }

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter(f);
}

function applyFilter(f) {
  items.forEach((item, i) => {
    const card = document.getElementById('card-' + i);
    if (!card) return;
    if (f === 'all') card.classList.remove('hidden');
    else if (f === 'pending') card.classList.toggle('hidden', item.done);
    else if (f === 'done') card.classList.toggle('hidden', !item.done);
  });
}

function updateProgress() {
  const done = items.filter(i => i.done).length, total = items.length;
  document.getElementById('badge').textContent = `${done} / ${total}`;
  document.getElementById('progressFill').style.width = total ? (done/total*100) + '%' : '0%';
  document.getElementById('countLabel').textContent = `已完成 ${done} 筆，共 ${total} 筆`;
}

function checkAllDone() {
  document.getElementById('allDoneBanner').classList.toggle('visible', items.length > 0 && items.every(i => i.done));
}

function resetAll() {
  if (items.some(i => i.done) && !confirm('確定重新上傳？進度將清除。')) return;
  items = [];
  document.getElementById('fileInput').value = '';
  document.getElementById('errMsg').classList.remove('visible');
  document.getElementById('input-view').style.display = 'block';
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('badge').classList.remove('visible');
  document.getElementById('progressBar').classList.remove('visible');
  document.getElementById('allDoneBanner').classList.remove('visible');
  document.getElementById('progressFill').style.width = '0%';
  currentFilter = 'all';
}
</script>
</body>
</html>
